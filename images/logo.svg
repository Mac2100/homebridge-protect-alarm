<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2330"/>
      <stop offset="1" stop-color="#10131b"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c3547"/>
      <stop offset="1" stop-color="#1a2130"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2bd84"/>
      <stop offset="1" stop-color="#e8a86a"/>
    </linearGradient>
  </defs>

  <!-- rounded app tile -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="108" fill="none"
        stroke="#3a4356" stroke-width="3" opacity="0.6"/>

  <!-- shield -->
  <path d="M256 86
           L394 138
           v118
           c0 92 -58 156 -138 184
           c-80 -28 -138 -92 -138 -184
           V138 Z"
        fill="url(#shield)" stroke="url(#amber)" stroke-width="14"
        stroke-linejoin="round"/>

  <!-- inner glass highlight -->
  <path d="M256 110
           L372 154
           v100
           c0 78 -48 132 -116 158
           c-68 -26 -116 -80 -116 -158
           V154 Z"
        fill="#ffffff" opacity="0.04"/>

  <!-- signal arcs (alarm/broadcast motif) -->
  <g fill="none" stroke="url(#amber)" stroke-width="16" stroke-linecap="round">
    <path d="M214 270 a60 60 0 0 1 84 0" opacity="0.55"/>
    <path d="M188 240 a96 96 0 0 1 136 0" opacity="0.35"/>
  </g>

  <!-- armed status dot -->
  <circle cx="256" cy="312" r="26" fill="url(#amber)"/>
  <circle cx="256" cy="312" r="26" fill="none" stroke="#10131b" stroke-width="5"/>
</svg>
