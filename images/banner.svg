<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171c27"/>
      <stop offset="1" stop-color="#0e1118"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2bd84"/>
      <stop offset="1" stop-color="#e8a86a"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c3547"/>
      <stop offset="1" stop-color="#1a2130"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" rx="24" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1277" height="317" rx="23" fill="none" stroke="#3a4356" opacity="0.5" stroke-width="3"/>

  <!-- faint grid texture -->
  <g stroke="#2a3242" stroke-width="1" opacity="0.25">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
  </g>

  <!-- shield mark -->
  <g transform="translate(96,52)">
    <path d="M110 0 L204 36 v80 c0 62 -40 106 -94 126 c-54 -20 -94 -64 -94 -126 V36 Z"
          fill="url(#shield)" stroke="url(#amber)" stroke-width="10" stroke-linejoin="round"/>
    <g fill="none" stroke="url(#amber)" stroke-width="11" stroke-linecap="round">
      <path d="M81 124 a41 41 0 0 1 58 0" opacity="0.55"/>
      <path d="M63 103 a66 66 0 0 1 94 0" opacity="0.35"/>
    </g>
    <circle cx="110" cy="152" r="17" fill="url(#amber)"/>
  </g>

  <!-- wordmark -->
  <text x="380" y="150" font-family="Avenir, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" fill="#e9edf5" letter-spacing="1">
    HomeKit Protect Alarm
  </text>
  <text x="382" y="206" font-family="'JetBrains Mono', 'SFMono-Regular', Menlo, monospace"
        font-size="26" fill="#8a94a8" letter-spacing="0.5">
    UniFi Protect &#8596; Apple Home &#183; one API key
  </text>

  <!-- state pills -->
  <g font-family="'JetBrains Mono', Menlo, monospace" font-size="20" text-anchor="middle">
    <rect x="380" y="236" width="110" height="40" rx="20" fill="#222a3a" stroke="#e8a86a" stroke-width="2"/>
    <text x="435" y="262" fill="#f2bd84">AWAY</text>
    <rect x="506" y="236" width="120" height="40" rx="20" fill="#222a3a" stroke="#e8a86a" stroke-width="2"/>
    <text x="566" y="262" fill="#f2bd84">NIGHT</text>
    <rect x="642" y="236" width="100" height="40" rx="20" fill="#222a3a" stroke="#3a4356" stroke-width="2"/>
    <text x="692" y="262" fill="#8a94a8">OFF</text>
  </g>
</svg>
